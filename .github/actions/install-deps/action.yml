name: Install dependencies
description: >
  Run `npm ci`, and if the lockfile is rejected, show what would heal it and
  fail the job. Works around npm/cli#4828: Windows npm occasionally drops
  nested strict pins (e.g. @rolldown/binding-wasm32-wasi → @emnapi) during
  rehoist, producing a lockfile that `npm ci` refuses on Linux even though
  the dep graph is fine. We still run `npm install --package-lock-only` so
  the CI log contains the exact diff the author needs to commit, then exit
  non-zero — because if we silently healed, the same drift just fails later
  at the Vercel deploy instead.

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        if ! npm ci; then
          echo "::error::npm ci rejected the lockfile (likely npm/cli#4828). Run 'npm install --package-lock-only' at the repo root and commit the updated package-lock.json."
          npm install --package-lock-only
          if ! git diff --quiet package-lock.json; then
            echo "::notice::Here's what needs to be committed:"
            git diff --stat package-lock.json
          fi
          exit 1
        fi
